<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  
  <title>Frontend Mentor | Product list with cart</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <div class="product-list">
    <h1>Desserts</h1>

    <div class="product-grid" id="product-grid">


    </div>
  
  </div>
  <div class="cart">
    <h2 class="cart-title">Your Cart (<span class="cart-count">0</span>)</h2>

    <div class="cart-empty">
      <img class="cart-empty-img" src="assets/images/illustration-empty-cart.svg" alt="Empty cart illustration">
      <p class="cart-empty-text">Your added items will appear here</p>
    </div>

    <ul class="cart-items"></ul>

    <div class="cart-total-container">
      <span>Total: $<span class="cart-total">0.00</span></span>
    </div>

    <p class="cart-carbon">This is a carbon-neutral delivery 🌱</p>

    <button class="cart-confirm">Confirm Order</button>
  </div>
</main>
<footer>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Evelyne Mukasa</a>.
  </div>
</footer>
<script src="script.js"></script>
</body>
</html>

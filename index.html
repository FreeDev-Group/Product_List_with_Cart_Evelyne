<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Product list with cart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <div class="product-list">
    <h1>Desserts</h1>
    <div class="product-grid" id="product-grid"></div>
  </div>

  <div class="cart">
    <h2 class="cart-title">Your Cart (<span class="cart-count">0</span>)</h2>
    <div class="cart-empty">
      <img class="cart-empty-img" src="assets/images/illustration-empty-cart.svg" alt="Empty cart illustration">
      <p class="cart-empty-text">Your added items will appear here</p>
    </div>
    <ul class="cart-items"></ul>
    <div class="cart-total-container">
      <span>Order Total: </span><span class="cart-total-span">$<span class="cart-total">0.00</span></span>
    </div>
    <p class="cart-carbon"> <img src="assets/images/icon-carbon-neutral.svg" alt="">This is a carbon-neutral delivery </p>
    <button class="cart-confirm">Confirm Order</button>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="order-modal">
    <div class="modal">
      <div class="modal-header">
        <img src="assets/images/icon-order-confirmed.svg" alt="" class="modal-icon">
        <h2>Order Confirmed</h2>
        <p>We hope you enjoy your food!</p>
      </div>
      <div class="rose-box">
          <ul class="modal-order-items"></ul>
          <div class="modal-total">
            <span>Order Total</span>
            <span class="order-total-amount">$0.00</span>
          </div>
      </div>
      <button class="modal-close-btn">Start New Order</button>
    </div>
  </div>
</main>

<footer>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Evelyne Mukasa</a>.
  </div>
</footer>
<script src="script.js"></script>
</body>
</html>
